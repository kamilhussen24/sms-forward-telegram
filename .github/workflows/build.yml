name: Build RelayGram

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build?'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - run: chmod +x gradlew

      # ── Debug ─────────────────────────────────────────────────────
      - name: Build Debug APK
        if: inputs.build_type == 'debug'
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        if: inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: relaygram-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── Release ───────────────────────────────────────────────────
      - name: Create keystore dir
        if: inputs.build_type == 'release'
        run: mkdir -p app/keystore

      - name: Decode Keystore
        if: inputs.build_type == 'release'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore/android.keystore

      - name: Build Release APK
        if: inputs.build_type == 'release'
        run: ./gradlew assembleRelease --stacktrace
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        if: inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: relaygram-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: inputs.build_type == 'release'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: RelayGram v${{ github.run_number }}
          body: RelayGram release build
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
